name: eontech_tourist_mobile
description: Eontech Tourist Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ────────────────────────────────
  go_router: ^13.0.0

  # ── State Management ──────────────────────────
  provider: ^6.1.5+1

  # ── Firebase ──────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # ── Google Sign-In ────────────────────────────
  google_sign_in: ^6.2.1

  # ── Networking ────────────────────────────────
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  socket_io_client: ^2.0.3+1

  # ── Maps & Location ───────────────────────────
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # ── Notifications ─────────────────────────────
  flutter_local_notifications: ^17.1.2

  # ── UI ────────────────────────────────────────
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  smooth_page_indicator: ^2.0.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  curved_navigation_bar: ^1.0.6

  # ── Utilities ─────────────────────────────────
  url_launcher: ^6.3.0
  intl: ^0.19.0
  json_annotation: ^4.8.1
  audioplayers: ^6.0.0
  haptic_feedback: ^0.5.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.7.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/